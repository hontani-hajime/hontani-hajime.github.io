<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日のスケジュール</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #schedule {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            display: inline-block;
            background-color: #f9f9f9;
        }
    </style>
    <script>
        async function fetchSchedule() {
            try {
                let response = await fetch("https://script.google.com/macros/s/AKfycbw8psDF0pxWeKr1HOLUxWIeD1pCM4GEJW-ONCBxZIxSMZGSvq63lJHjVSuIFE_r7SYn/exec");
                let text = await response.text();
                document.getElementById("schedule").innerHTML = text;
            } catch (error) {
                console.error("データの取得に失敗しました:", error);
                document.getElementById("schedule").innerHTML = "取得に失敗しました";
            }
        }
        window.onload = fetchSchedule;
    </script>
</head>
<body>
    <h1>今日のスケジュール</h1>
    <div id="schedule">読み込み中...</div>
</body>
</html>
