<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム日時表示</title>
    <style>
        body {
            margin: 0;
            font-family: "Arial", sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 10px;
        }
        .top-bar {
            width: 90%;
            height: 40px;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .wide-box {
            width: 90%;
            height: 150px;
            border: 1px solid black;
            background-color: white;
            margin-bottom: 5px;
        }
        .bottom-container {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            width: 90%;
            justify-content: space-between;
        }
        .small-box {
            width: 45%;
            height: 100px;
            border: 1px solid black;
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar" id="datetime"></div>
        <div class="wide-box"></div>
        <div class="bottom-container">
            <div class="small-box"></div>
            <div class="small-box"></div>
        </div>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById("datetime").textContent = now.toLocaleDateString('ja-JP', options);
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>
</html>
