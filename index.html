<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日のスケジュール</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #schedule {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            display: inline-block;
            background-color: #f9f9f9;
        }
        #error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>今日のスケジュール</h1>
    <div id="schedule">読み込み中...</div>
    <div id="error"></div>

    <script>
        async function fetchSchedule() {
            const url = "https://script.google.com/macros/s/AKfycbw8psDF0pxWeKr1HOLUxWIeD1pCM4GEJW-ONCBxZIxSMZGSvq63lJHjVSuIFE_r7SYn/exec";

            try {
                let response = await fetch(url);

                if (!response.ok) {
                    throw new Error("HTTPエラー: " + response.status);
                }

                let text = await response.text();
                document.getElementById("schedule").textContent = text;
            } catch (error) {
                document.getElementById("error").textContent = "エラー: " + error.message;
            }
        }

        window.onload = fetchSchedule;
    </script>
</body>
</html>
