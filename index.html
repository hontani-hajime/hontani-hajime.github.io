<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- サイトのタイトル -->
    <title>はじめの部屋</title>

    <!-- 通常のブラウザのタブ用ファビコン（すべて小文字） -->
    <link rel="icon" href="favicon.jpg" type="image/jpeg">

    <!-- iOS (iPhone/iPad) ホーム画面追加時・お気に入り用のアイコン -->
    <link rel="apple-touch-icon" href="favicon.jpg">
    
    <!-- AndroidやChrome用の高解像度アイコン指定 -->
    <link rel="icon" type="image/jpeg" sizes="192x192" href="favicon.jpg">
</head>
<body>
    <h1>はじめの部屋へようこそ！</h1>
    <p>本谷元（ホンタニハジメ）のポートフォリオサイトです。</p>
    <p>これからカメラの写真や、架空のWebサイトなどを追加していく予定です！</p>
</body>
</html>
