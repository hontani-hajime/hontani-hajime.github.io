<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>割り勘計算機</title>
    
    <!-- ファビコン・iOS・Android用アイコン設定 -->
    <link rel="icon" href="/favicon.jpg">
    <link rel="apple-touch-icon" href="/favicon.jpg">
    <meta name="msapplication-TileImage" content="/favicon.jpg">
    
    <!-- FontAwesome (ボタンのアイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        /* === 全体のベースデザイン（ボタンのモチーフに合わせたポップな配色） === */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #e1f3ff;
            color: #003067;
            margin: 0;
            padding: 20px;
            /* 背景にもうっすらストライプ模様を配置 */
            background-image:
            linear-gradient(45deg, #c8e4ff 25%, transparent 0),
            linear-gradient(45deg, transparent 75%, #c8e4ff 0),
            linear-gradient(45deg, #c8e4ff 25%, transparent 0),
            linear-gradient(45deg, transparent 75%, #c8e4ff 0);
            background-position: 0 0, 15px 15px, 15px 15px, 30px 30px;
            background-size: 30px 30px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            border: 3px solid #000;
            border-radius: 10px;
            padding: 30px 20px;
            box-shadow: 0 0.6rem 0 0 rgb(0 0 0 / 20%);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-top: 0;
            border-bottom: 2px dashed #6bb6ff;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* 入力フォームもボタンのデザインに寄せる */
        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #000;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fafafa;
        }

        .names-container {
            background: #f0f8ff;
            padding: 15px;
            border: 2px solid #000;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        /* === 結果表示エリア === */
        .result-area {
            display: none; /* 初期は非表示 */
            margin-top: 30px;
            padding-top: 20px;
            border-top: 3px solid #000;
        }

        .result-list {
            list-style: none;
            padding: 0;
            font-size: 18px;
            font-weight: bold;
        }
        .result-list li {
            padding: 10px;
            border-bottom: 1px solid #c8e4ff;
            display: flex;
            justify-content: space-between;
        }

        .remainder-alert {
            background: #ffecb3;
            border: 2px solid #000;
            color: #d84315;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
        }

        /* === 余り処理エリア === */
        .remainder-options {
            background: #e1f3ff;
            border: 2px solid #000;
            border-radius: 5px;
            padding: 15px;
            margin-top: 20px;
        }

        .checkbox-group {
            margin-bottom: 15px;
        }
        .checkbox-group label {
            display: inline-block;
            margin-right: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .spacer {
            height: 20px;
        }


        /* === ご提供いただいたボタンデザイン（そのまま活用・リンク下線のみ削除追加） === */
        .button_solid016 a {
            text-decoration: none; /* 追加: リンクの下線を消す */
            background: #6bb6ff;
            border-radius: 3px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            max-width: 240px;
            padding: 10px 25px;
            color: #003067;
            transition: 0.3s ease-in-out;
            font-weight: 600;
            border: 2px solid #000;
            z-index: 1;
            border-radius: 5px;
            cursor: pointer;
        }
        .button_solid016 a:before {
            content: "";
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: -1;
            border: 2px solid #000;
            border-radius: 5px;
            background: #e1f3ff;
            background-image:
            linear-gradient(45deg, #c8e4ff 25%, transparent 0),
            linear-gradient(45deg, transparent 75%, #c8e4ff 0),
            linear-gradient(45deg, #c8e4ff 25%, transparent 0),
            linear-gradient(45deg, transparent 75%, #c8e4ff 0);
            background-position: 0 0, 15px 15px, 15px 15px, 30px 30px;
            background-size: 30px 30px;
        }
        .button_solid016 a:after {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            content: '';
            -webkit-transition: all .3s;
            transition: all .3s;
            -webkit-transform: translate3d(0,0.40rem,-1rem);
            transform: translate3d(0,0.40rem,-1rem);
            border: 2px solid #000;
            border-radius: inherit;
            background: #2b7fde;
            -webkit-box-shadow: 0 0.6rem 0 0 rgb(0 0 0 / 20%);
            box-shadow: 0 0.4rem 0 0 rgb(0 0 0 / 20%);
            z-index: -2;
        }
        .button_solid016 a i {
            position: absolute;
            right: 9px;
        }
        .button_solid016 a:hover {
            transform: translate3d(0,0.2rem,-1rem);
        }
        .button_solid016 a:hover:after {
            transform: translate3d(0,0.2rem,-1rem);
            box-shadow: 0 0.2rem 0 0 rgb(0 0 0 / 20%);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>割り勘計算機</h1>

    <!-- 1. 入力セクション -->
    <div class="input-group">
        <label for="total-amount">合計金額（円）</label>
        <input type="number" id="total-amount" placeholder="例: 15800" min="1">
    </div>

    <div class="input-group">
        <label for="num-people">人数（人）</label>
        <input type="number" id="num-people" placeholder="例: 4" min="1" oninput="generateNameInputs()">
    </div>

    <div class="names-container" id="names-container" style="display:none;">
        <p style="margin-top:0; font-weight:bold;">メンバーの名前を入力（任意）</p>
        <div id="names-list"></div>
    </div>

    <div class="button_solid016">
        <a onclick="calculateBase()"><i class="fas fa-calculator" style="left:9px; right:auto;"></i>まずは均等に計算<i class="fas fa-angle-right"></i></a>
    </div>

    <!-- 2. 結果・余り処理セクション -->
    <div class="result-area" id="result-area">
        <ul class="result-list" id="result-list">
            <!-- 結果がここに表示されます -->
        </ul>

        <!-- 余りがある場合のみ表示されるエリア -->
        <div id="remainder-section" style="display: none;">
            <div class="remainder-alert" id="remainder-text"></div>

            <div class="remainder-options">
                <div class="section-title">🌟 余りはどうする？ 🌟</div>
                
                <!-- ガチャ機能 -->
                <p style="text-align:center; margin-bottom:5px;">＼ 運任せ！ ／</p>
                <div class="button_solid016">
                    <a onclick="executeGacha()" style="background:#ff9800; color:#fff;">ガチャで1人が払う<i class="fas fa-random"></i></a>
                </div>
                
                <hr style="border:1px dashed #000; margin: 25px 0;">

                <!-- 指定メンバーで割る機能 -->
                <p style="text-align:center; margin-bottom:10px;">＼ 特定の人で分ける ／</p>
                <div class="checkbox-group" id="remainder-checkboxes">
                    <!-- チェックボックスが生成されます -->
                </div>

                <div class="input-group">
                    <label for="final-boss">さらに余った時の最後の1人：</label>
                    <select id="final-boss">
                        <!-- セレクトボックスが生成されます -->
                    </select>
                </div>
                <div class="spacer"></div>
                <div class="button_solid016">
                    <a onclick="calculateRemainder()" style="background:#4caf50; color:#fff;">余りを指定通りに配分<i class="fas fa-check"></i></a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let participants = []; // { id: number, name: string, amount: number }
    let currentRemainder = 0;

    // 人数が入力されたら名前入力欄を自動生成する
    function generateNameInputs() {
        const num = parseInt(document.getElementById('num-people').value) || 0;
        const container = document.getElementById('names-container');
        const list = document.getElementById('names-list');
        
        if (num > 0) {
            container.style.display = 'block';
            let html = '';
            for (let i = 1; i <= num; i++) {
                html += `<div class="input-group">
                            <input type="text" id="name-${i}" placeholder="${i}人目の名前" value="メンバー${i}">
                         </div>`;
            }
            list.innerHTML = html;
        } else {
            container.style.display = 'none';
        }
        
        // 入力が変わったら結果エリアは一旦隠す
        document.getElementById('result-area').style.display = 'none';
    }

    // 初回の割り勘計算
    function calculateBase() {
        const total = parseInt(document.getElementById('total-amount').value) || 0;
        const num = parseInt(document.getElementById('num-people').value) || 0;

        if (total <= 0 || num <= 0) {
            alert("金額と人数を正しく入力してください。");
            return;
        }

        participants = [];
        for (let i = 1; i <= num; i++) {
            let nameVal = document.getElementById(`name-${i}`).value || `メンバー${i}`;
            participants.push({ id: i, name: nameVal, amount: 0 });
        }

        const baseAmount = Math.floor(total / num);
        currentRemainder = total % num;

        participants.forEach(p => p.amount = baseAmount);

        updateUI();
        document.getElementById('result-area').style.display = 'block';
    }

    // 画面（結果一覧・余り用フォーム）の更新
    function updateUI() {
        // 金額リストの描画
        const resultList = document.getElementById('result-list');
        resultList.innerHTML = '';
        participants.forEach(p => {
            resultList.innerHTML += `<li><span>${p.name}</span> <span>${p.amount.toLocaleString()} 円</span></li>`;
        });

        // 余りの処理エリアの表示制御
        const remainderSection = document.getElementById('remainder-section');
        if (currentRemainder > 0) {
            document.getElementById('remainder-text').innerText = `現在、余りが ${currentRemainder} 円 あります！`;
            remainderSection.style.display = 'block';

            // 余りを割る人を選ぶチェックボックスの生成
            const cbContainer = document.getElementById('remainder-checkboxes');
            cbContainer.innerHTML = '';
            participants.forEach(p => {
                cbContainer.innerHTML += `<label><input type="checkbox" class="rem-target" value="${p.id}"> ${p.name}</label>`;
            });

            // 最後の1人を選ぶセレクトボックスの生成
            const bossSelect = document.getElementById('final-boss');
            bossSelect.innerHTML = '';
            participants.forEach(p => {
                bossSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });
        } else {
            remainderSection.style.display = 'none';
            alert("きれいに割り切れました！（余り0円）");
        }
    }

    // 余りのガチャ機能
    function executeGacha() {
        if(currentRemainder <= 0) return;
        
        // アニメーション風に少し待つ演出も可能ですが、今回はシンプルに即時判定
        const winnerIndex = Math.floor(Math.random() * participants.length);
        const winner = participants[winnerIndex];
        
        winner.amount += currentRemainder;
        alert(`🎉 ガチャ結果 🎉\n\n余りの ${currentRemainder}円 は\n【 ${winner.name} 】さんが払います！`);
        
        currentRemainder = 0;
        updateUI();
    }

    // 指定したメンバーで余りを分け、さらに余ったら特定の人が払う機能
    function calculateRemainder() {
        if(currentRemainder <= 0) return;

        const checkboxes = document.querySelectorAll('.rem-target:checked');
        if (checkboxes.length === 0) {
            alert("余りを分担する人を1人以上選択してください！");
            return;
        }

        const selectedIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
        
        const splitBase = Math.floor(currentRemainder / selectedIds.length);
        const splitRem = currentRemainder % selectedIds.length;

        // 選ばれた人に均等に足す
        selectedIds.forEach(id => {
            let p = participants.find(p => p.id === id);
            p.amount += splitBase;
        });

        let message = `選択したメンバーに余りを配分しました。`;

        // それでも余った場合（例えば3円を2人で割った時の1円など）
        if (splitRem > 0) {
            const bossId = parseInt(document.getElementById('final-boss').value);
            let boss = participants.find(p => p.id === bossId);
            boss.amount += splitRem;
            message += `\n\nさらに割り切れなかった ${splitRem}円 は設定通り 【 ${boss.name} 】さんが払います！`;
        }

        alert(message);
        
        currentRemainder = 0;
        updateUI();
    }
</script>

</body>
</html>
